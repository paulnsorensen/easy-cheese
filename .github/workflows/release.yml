name: release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: publish github release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is not an ancestor of origin/main. Refusing to publish a release from an unreviewed branch."
            exit 1
          fi

      - name: Install latest gh CLI
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | jq -r .tag_name)
          ver="${latest#v}"
          curl -fsSL "https://github.com/cli/cli/releases/download/${latest}/gh_${ver}_linux_amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 "/tmp/gh_${ver}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Validate skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run

      - name: Stage shippable release tree
        run: python3 scripts/stage_release.py --out "$RUNNER_TEMP/release"

      # `gh skill install` reads the git tree at the resolved tag, so the tag must
      # point at a commit that actually contains the built .pyz. main carries the
      # bundles (build-pyz.yml keeps them in sync), but we still publish a slim
      # `release` branch — SKILL.md + .pyz + top-level metadata, no src/shared/
      # tests/docs — and force the version tag onto THAT commit so releases ship
      # only the runtime surface. Pushes use GITHUB_TOKEN, which by design does
      # not re-trigger this tag-push workflow.
      - name: Publish release branch and retarget tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          src_sha="$GITHUB_SHA"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          cd "$RUNNER_TEMP/release"
          git init -q
          git checkout -q -b release
          git add -A
          git -c user.email=actions@github.com -c user.name="github-actions[bot]" \
            commit -qm "release: $TAG from main@${src_sha}"
          git push -f "$remote" "release:refs/heads/release"
          git tag -f "$TAG"
          git push -f "$remote" "refs/tags/$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |-
          set -euo pipefail
          gh repo edit "$GITHUB_REPOSITORY" --add-topic agent-skills || true
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --verify-tag
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
