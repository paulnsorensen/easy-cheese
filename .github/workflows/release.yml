name: release

on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: publish github release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is not an ancestor of origin/main. Refusing to publish a release from an unreviewed branch."
            exit 1
          fi

      - name: Install latest gh CLI
        run: |
          set -euo pipefail
          latest=$(curl -fsSL https://api.github.com/repos/cli/cli/releases/latest | jq -r .tag_name)
          ver="${latest#v}"
          curl -fsSL "https://github.com/cli/cli/releases/download/${latest}/gh_${ver}_linux_amd64.tar.gz" | tar -xz -C /tmp
          sudo install -m 755 "/tmp/gh_${ver}_linux_amd64/bin/gh" /usr/local/bin/gh
          gh --version

      - name: Validate skills
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh skill publish --dry-run

      - name: Drop trigger tag so skill publish can recreate it
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git push origin ":refs/tags/$TAG"
          git tag -d "$TAG" || true

      - name: Build and stage skill bundles
        run: |
          set -euo pipefail
          python3 scripts/build_pyz.py
          bundles="skills/melt/scripts/melt.pyz skills/cheese-factory/scripts/cheese-factory.pyz"
          # Fail loudly if a bundle is missing rather than publishing a broken skill.
          for pyz in $bundles; do
            test -f "$pyz" || { echo "::error::expected bundle missing after build: $pyz"; exit 1; }
          done
          git add -f $bundles
          # Confirm bundles are actually staged before they get published.
          staged="$(git diff --cached --name-only -- '*.pyz')"
          for pyz in $bundles; do
            echo "$staged" | grep -qxF "$pyz" || { echo "::error::bundle not staged for publish: $pyz"; exit 1; }
          done
          git -c user.email=actions@github.com -c user.name="github-actions[bot]" commit -m "build: bundle skill .pyz for release"

      - name: Publish agent skills
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh skill publish --tag "$TAG"
