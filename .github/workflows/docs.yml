name: docs

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "shared/**"
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "scripts/gen_docs.py"
      - ".github/workflows/docs.yml"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
  pull_request:
    paths:
      - "skills/**"
      - "shared/**"
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "scripts/gen_docs.py"
      - ".github/workflows/docs.yml"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
  workflow_dispatch:

permissions:
  contents: read

# PR/build runs are cheap to cancel and re-run; Pages deployments are not —
# cancelling one mid-flight can leave a stuck deployment that makes later runs
# fail with "Deployment failed, try again later". So the two jobs use separate
# concurrency scopes: builds cancel redundant runs, the deploy never does.
jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Python docs dependencies
        run: python -m pip install pyyaml==6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "22"
          cache: pnpm
      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build docs
        run: pnpm run docs:build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
