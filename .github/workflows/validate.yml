name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --no-cache-dir pyyaml==6.0.2

      - name: Test SKILL.md validator
        run: python3 .github/scripts/test_validate_skills.py -v

      - name: Validate SKILL.md frontmatter
        run: python3 .github/scripts/validate_skills.py

  test:
    name: test melt + shared + cheese-factory scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install pytest + pyyaml
        run: pip install --no-cache-dir pytest==9.0.3 pyyaml==6.0.2

      - name: Run melt script tests
        run: python3 -m pytest tests/python -q

      - name: Run shared script tests
        run: python3 -m pytest tests/shared/python -q

      - name: Run cheese-factory script tests
        run: python3 -m pytest tests/cheese-factory/python -q

  install-script:
    name: test install.sh (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install bats and shellcheck
        run: brew install bats-core shellcheck

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --no-cache-dir pyyaml==6.0.2

      - name: Lint install.sh
        run: shellcheck scripts/install.sh

      - name: Run install.sh tests
        run: bats tests/bash/test_install.bats

      - name: Run cheese-factory pr_plan_to_branches tests
        run: bats tests/cheese-factory/bash/test_pr_plan_to_branches.bats

      # Real (un-stubbed) smoke test: actually resolve every brew formula,
      # exercise the cargo-or-npm tilth install path, and run the gh-skill
      # install on a fresh macos-latest runner. Catches "phantom formula"
      # / "tap doesn't exist" / "this skill doesn't publish" bugs that the
      # bats suite (which stubs everything) cannot. --skip-mcp avoids
      # needing claude/tavily creds.
      - name: Real install smoke test (--skip-mcp)
        env:
          GH_TOKEN: ${{ github.token }}
          # Pin every skill install to the commit under test so the smoke
          # test exercises the script against this PR / push, not against
          # the latest released tag (which can lag behind main when new
          # skills are added).
          EC_SKILL_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/install.sh --skip-mcp

      # Real install of the code-review-graph CLI. Sourcing the script and
      # calling the function directly skips the MCP-registration step that
      # needs a claude CLI on the runner, while still exercising the actual
      # pip/pipx/uv install path. EC_CRG_SPEC overrides the default
      # 'code-review-graph[embeddings]' spec so CI installs the bare CLI;
      # the [embeddings] extra pulls sentence-transformers, which builds
      # the tokenizers Rust crate from source on macOS arm64 and burns
      # minutes per run. Catches cases where 'code-review-graph' stops
      # being a valid PyPI target; does not catch breakage in the
      # [embeddings] extra specifically.
      - name: CRG install smoke test
        env:
          EC_CRG_SPEC: code-review-graph
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source scripts/install.sh
          ec_install_crg_cli
          # Cover every install-path bin location: pipx + uv tool install
          # land in $HOME/.local/bin; pip --user lands under the Python
          # user-base bin dir.
          export PATH="$HOME/.local/bin:$(python3 -m site --user-base)/bin:$PATH"
          code-review-graph --version

  lint:
    name: lint markdown, yaml, python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            skills/**/*.md
            *.md

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: .
          config_file: .yamllint.yml
          format: github

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --no-cache-dir ruff

      - name: ruff check
        run: ruff check .

  pr-title:
    name: conventional commits pr title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
