name: build-pyz

# Keep the per-skill .pyz bundles on main in sync with their sources so anyone
# pinning `gh skill install` to a main commit (e.g. via EC_SKILL_REF, or any
# between-release smoke test) gets a working skill — not a SKILL.md invoking a
# bundle the gitignore filtered out. Releases still go through release.yml.

on:
  push:
    branches: [main]
    # Bundles depend only on skill sources, shared scripts, and the build
    # script itself — doc/workflow/.gitignore-only pushes skip the rebuild.
    paths:
      - 'src/**'
      - 'shared/scripts/**'
      - 'scripts/build_pyz.py'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build .pyz bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Build bundles
        run: python3 scripts/build_pyz.py

      # GITHUB_TOKEN-driven pushes do not retrigger workflows, so this will not
      # loop on its own commits. Stage first so newly-built bundles for a
      # freshly-added skill (still untracked) are caught by the index-vs-HEAD
      # diff — a plain `git diff` on the working tree would skip them.
      - name: Commit and push if changed
        run: |-
          set -euo pipefail
          git add -- 'skills/*/scripts/*.pyz'
          if git diff --cached --quiet; then
            echo "No bundle changes to commit."
            exit 0
          fi
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git commit -m "chore(build): rebuild .pyz bundles for ${GITHUB_SHA}"
          # main may have advanced since checkout (a concurrent push slipped
          # in); rebase before push and retry once if we lose the race again.
          for attempt in 1 2; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
          done
          echo "Failed to push after rebase retry" >&2
          exit 1
