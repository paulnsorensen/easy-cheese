name: docs-retry

# Auto-recover from transient GitHub Pages deploy flakes ("Deployment failed,
# try again later" — a backend reject the build never sees). The docs deploy is
# a composite `uses: actions/deploy-pages` step, which a step-level retry action
# (nick-fields/retry et al.) cannot wrap — those only retry a shell `command:`.
# So we retry at the run level: on a failed docs run on main, re-run its failed
# jobs, capped at 2 retries via run_attempt so a genuinely broken build can't loop.
on:
  workflow_run:
    workflows: ["docs"]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Re-run failed jobs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "docs run $RUN_ID failed (attempt ${{ github.event.workflow_run.run_attempt }}) — re-running failed jobs"
          gh run rerun "$RUN_ID" --failed --repo "$GITHUB_REPOSITORY"
