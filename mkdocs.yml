site_name: 🧀 easy-cheese
site_description: Harness-agnostic Agent Skills (agentskills.io) — the cheese-making pipeline that ages raw curds into shippable wheels of code.
site_url: https://paulnsorensen.github.io/easy-cheese/
site_author: Paul Sorensen

repo_name: paulnsorensen/easy-cheese
repo_url: https://github.com/paulnsorensen/easy-cheese
edit_uri: edit/main/

copyright: Copyright &copy; 2026 Paul Sorensen — MIT License · aged to perfection 🧀

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/cheese
        name: Switch to the cave (dark mode)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/cheese-off
        name: Switch to the dairy (light mode)
  icon:
    logo: material/cheese
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note: material/cheese-off
      abstract: material/clipboard-text
      info: material/information
      tip: material/cheese
      success: material/check-decagram
      question: material/help-circle
      warning: material/alert
      failure: material/close-octagon
      danger: material/skull-crossbones
      bug: material/bug
      example: material/test-tube
      quote: material/format-quote-close
  favicon: assets/favicon.svg

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_docs.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/cheese.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paulnsorensen/easy-cheese
      name: Source code on GitHub
    - icon: fontawesome/solid/mug-hot
      link: https://www.buymeacoffee.com/paulnsorensen
      name: Buy the cheesemonger a coffee
